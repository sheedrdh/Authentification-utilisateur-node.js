<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Demo - Login & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #334155;
            --error: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--input-bg);
            background-color: var(--input-bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .toggle-btn {
            background: none;
            color: var(--primary);
            padding: 0;
            font-size: 14px;
            font-weight: 400;
            margin-top: 16px;
            width: auto;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .toggle-btn:hover {
            background: none;
            text-decoration: underline;
        }

        #message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .success {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        #token-display {
            margin-top: 20px;
            font-size: 12px;
            word-break: break-all;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Register</h1>
        <p class="subtitle" id="subtitle">Create an account to get started</p>

        <form id="auth-form">
            <div class="form-group" id="username-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="johndoe">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn">Register</button>
        </form>

        <button class="toggle-btn" id="toggle-form">Already have an account? Login</button>

        <div id="message"></div>
        <div id="token-display"></div>
    </div>

    <script>
        const form = document.getElementById('auth-form');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-form');
        const usernameGroup = document.getElementById('username-group');
        const messageDiv = document.getElementById('message');
        const tokenDisplay = document.getElementById('token-display');

        let isLogin = false;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                title.innerText = 'Login';
                subtitle.innerText = 'Welcome back! Enter your credentials';
                submitBtn.innerText = 'Login';
                toggleBtn.innerText = "Don't have an account? Register";
                usernameGroup.style.display = 'none';
            } else {
                title.innerText = 'Register';
                subtitle.innerText = 'Create an account to get started';
                submitBtn.innerText = 'Register';
                toggleBtn.innerText = 'Already have an account? Login';
                usernameGroup.style.display = 'block';
            }
            messageDiv.style.display = 'none';
            tokenDisplay.style.display = 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
            const body = isLogin ? { email, password } : { username, email, password };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (res.ok) {
                    messageDiv.innerText = isLogin ? 'Login successful!' : 'Registration successful!';
                    messageDiv.className = 'success';
                    messageDiv.style.display = 'block';
                    if (data.token) {
                        tokenDisplay.innerText = 'Token: ' + data.token;
                        tokenDisplay.style.display = 'block';
                    }
                } else {
                    const errorMsg = data.message || (data.errors ? data.errors[0].msg : 'Something went wrong');
                    messageDiv.innerText = errorMsg;
                    messageDiv.className = 'error';
                    messageDiv.style.display = 'block';
                }
            } catch (err) {
                messageDiv.innerText = 'Server error. Is the backend running?';
                messageDiv.className = 'error';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
